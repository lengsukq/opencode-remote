name: opencode_remote
description: "Remote control for opencode AI coding agent."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.4
  webview_flutter: ^4.10.0
  webview_flutter_web: ^0.2.3+4
  http: ^1.2.0
  flutter_markdown: ^0.7.0
  intl: ^0.19.0
  flutter_highlight: ^0.7.0
  image_picker: ^1.1.2
  file_picker: ^8.1.7

flutter:
  uses-material-design: true
dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
