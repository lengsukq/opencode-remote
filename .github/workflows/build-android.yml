name: Build Android APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.x

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate CI signing keystore
        run: |
          mkdir -p config/keystore
          keytool -genkey -v \
            -keystore config/keystore/release.keystore \
            -alias opencode-remote \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "ci_build_password" \
            -keypass "ci_build_password" \
            -dname "CN=CI Build, OU=Development, O=opencode, L=Unknown, ST=Unknown, C=CN" \
            -noprompt
          cat > config/keystore/key.properties << EOF
          storePassword=ci_build_password
          keyPassword=ci_build_password
          keyAlias=opencode-remote
          storeFile=../config/keystore/release.keystore
          EOF

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-remote-v${{ steps.version.outputs.tag }}-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-remote-v${{ steps.version.outputs.tag }}-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: OpenCode Remote v${{ steps.version.outputs.tag }}
          tag_name: ${{ github.ref_name }}
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true
